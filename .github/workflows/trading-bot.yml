name: NEXUS Trading Bot

on:
  schedule:
    # Toutes les 15 minutes (minimum GitHub Actions)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permet aussi de lancer manuellement depuis GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Pour pouvoir commiter les fichiers JSON

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activation Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: pip install requests

      - name: Lancement du bot de trading
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          CLAUDE_API_KEY:    ${{ secrets.CLAUDE_API_KEY }}
          BITPANDA_API_KEY:  ${{ secrets.BITPANDA_API_KEY }}
        run: python bot.py

      - name: Commit et push des résultats
        run: |
          git config --local user.email "bot@nexus-trading.ai"
          git config --local user.name "HAOUD Bot"
          git add docs/trade_history.json docs/bot_state.json
          git diff --staged --quiet || git commit -m "🤖 Bot update — $(date '+%d/%m/%Y %H:%M') UTC"
          git pull --rebase origin main
          git push
