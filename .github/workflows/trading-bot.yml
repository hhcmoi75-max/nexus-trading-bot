name: HAOUD Trading Bot v5.0

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activation Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: pip install requests scikit-learn numpy

      - name: Lancement du bot de trading
        env:
          CLAUDE_API_KEY:    ${{ secrets.CLAUDE_API_KEY }}
          BITPANDA_API_KEY:  ${{ secrets.BITPANDA_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit et push des resultats
        run: |
          git config --local user.email "bot@haoud-trading.ai"
          git config --local user.name "HAOUD Bot v5"
          # Ajouter tous les fichiers modifies
          git add -f docs/trade_history.json docs/bot_state.json docs/macro_cache.json \
                     docs/backtest.json docs/optimized_params.json \
                     docs/learning.json docs/wisdom.json || true
          # Ajouter le modele ML si present (fichier binaire)
          [ -f docs/ml_model.pkl ] && git add -f docs/ml_model.pkl || true
          # Commiter seulement si changements
          git diff --staged --quiet && echo "Rien a commiter" && exit 0
          git commit -m "🤖 v5 update — $(date '+%d/%m/%Y %H:%M') UTC"
          # Récupérer les changements distants avant push
          git fetch origin main
          git rebase origin/main
          git push
