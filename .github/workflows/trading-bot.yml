name: HAOUD Trading Bot v5.0

on:
  schedule:
    # Toutes les 5 minutes (minimum GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Activation Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dependances
        run: pip install requests scikit-learn numpy

      - name: Lancement du bot de trading
        env:
          CLAUDE_API_KEY:    ${{ secrets.CLAUDE_API_KEY }}
          BITPANDA_API_KEY:  ${{ secrets.BITPANDA_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Commit et push des resultats
        run: |
          git config --local user.email "bot@haoud-trading.ai"
          git config --local user.name "HAOUD Bot v5"
          git add docs/trade_history.json docs/bot_state.json docs/macro_cache.json docs/backtest.json docs/optimized_params.json docs/whale_alerts.json docs/learning.json docs/wisdom.json docs/ml_model.pkl 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 v5 update — $(date '+%d/%m/%Y %H:%M') UTC"
          git pull --rebase origin main
          git push
